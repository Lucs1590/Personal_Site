name: Update Books Data

on:
  schedule:
    # Run every 2 weeks on Sunday at 00:00 UTC (on weeks 2 and 4 of each month)
    - cron: "0 0 1,15 * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  update-books:
    name: Fetch and Update Books Data
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18"

      - name: Install dependencies
        run: |
          npm install fast-xml-parser --save-dev --force

      - name: Fetch books data
        run: |
          node .github/scripts/fetch-books.js

      - name: Commit and create pull request if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH_NAME="chore/update-books-data-${{ github.run_id }}"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -b "$BRANCH_NAME"
          git add src/assets/static_data/books.ts

          if git diff --staged --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "chore: update books data [automated]"
          git push --set-upstream origin "$BRANCH_NAME"
          gh pr create \
            --title "chore: update books data" \
            --body "Automated update of books data." \
            --base master \
            --head "$BRANCH_NAME"
