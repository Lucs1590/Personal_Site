name: Update Books Data

on:
  schedule:
    # Run every 2 weeks on Sunday at 00:00 UTC
    - cron: '0 0 */14 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-books:
    name: Fetch and Update Books Data
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install fast-xml-parser --save-dev

      - name: Fetch books data
        run: |
          node .github/scripts/fetch-books.js

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/assets/static_data/books.json
          git diff --staged --quiet || git commit -m "chore: update books data [automated]"
          git push
