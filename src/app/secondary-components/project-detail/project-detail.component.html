<div class="container-fluid" style="min-height: -webkit-fill-available; overflow-y: auto;">
  <app-navbar></app-navbar>
  <div class="row">
    <div class="col-md-12">
      <h2>{{ project.name }}</h2>
      <p>{{ project.description }}</p>
      <h4>Technologies Used</h4>
      <ul>
        @for (tech of project.technologies; track $index) {
        <li>{{ tech }}</li>
        }
      </ul>
      <h4>Images</h4>
      <div class="row">
        @for (image of project.images; track $index) {
        <div class="col-md-4">
          <img [src]="image" class="img-fluid" alt="Project Image">
        </div>
        }
      </div>
      <h4>Videos</h4>
      <div class="row">
        @for (video of project.videos; track $index) {
        <div class="col-md-6">
          <video controls [src]="video" class="img-fluid"></video>
        </div>
        }
      </div>
    </div>
  </div>
</div>
