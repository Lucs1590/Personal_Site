<section class="recommendations-section" aria-labelledby="recommendations-heading">
  <div class="container-fluid px-3 px-md-5">
    <h2 id="recommendations-heading" class="recommendations-title" translate>recommendations.title</h2>

    <div class="recommendations-grid" role="list">
      <article *ngFor="let rec of recommendations; trackBy: trackById" class="recommendation-card" role="listitem">

        <div class="card-quote-icon" aria-hidden="true">"</div>

        <p class="card-text">
          {{ getDisplayText(rec) }}
        </p>

        <button type="button" *ngIf="isTruncatable(rec)" class="read-more-btn" (click)="toggleExpanded(rec.id)"
          [attr.aria-expanded]="isExpanded(rec.id)"
          [attr.aria-label]="(isExpanded(rec.id) ? ('recommendations.read_less' | translate) : ('recommendations.read_more' | translate)) + ' - ' + rec.name">
          {{ isExpanded(rec.id) ? ('recommendations.read_less' | translate) : ('recommendations.read_more' | translate)
          }}
        </button>

        <footer class="card-footer">
          <img *ngIf="rec.profileImage; else avatarFallback" class="author-avatar" [src]="rec.profileImage"
            [alt]="rec.name" loading="lazy" width="48" height="48">
          <ng-template #avatarFallback>
            <div class="author-avatar author-avatar--fallback" aria-hidden="true">
              {{ rec.name.charAt(0) }}
            </div>
          </ng-template>

          <div class="author-info">
            <a *ngIf="rec.linkedinUrl; else nameOnly" [href]="rec.linkedinUrl" target="_blank" rel="noopener noreferrer"
              class="author-name" [attr.aria-label]="rec.name + ' - LinkedIn'">
              {{ rec.name }}
            </a>
            <ng-template #nameOnly>
              <span class="author-name">{{ rec.name }}</span>
            </ng-template>
            <span class="author-role">{{ rec.role }} · {{ rec.company }}</span>
            <span *ngIf="rec.relationship" class="author-relationship">{{ rec.relationship }}</span>
          </div>
        </footer>

      </article>
    </div>
  </div>
</section>
