<div class="d-flex justify-content-center icons_div">

    @for (icon of iconList; track trackByIconLink) {
    @if (icon.active) {
    <a [href]=icon.link class="text-white ms-3 icon" target="_blank" [attr.aria-label]="icon.description"
        disableWhenOffline>
        <fa-icon [icon]=icon.icon></fa-icon>
    </a>
    }
    }

</div>
